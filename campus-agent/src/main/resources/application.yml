server:
  port: 8080 # 后端端口
  servlet:
    context-path: / # 移除/api前缀，方便前端相对路径调用

spring:
  # 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/campus_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root # 替换为你的MySQL用户名
    password: 123456 # 替换为你的MySQL密码
  # 定时任务配置
  task:
    scheduling:
      pool:
        size: 10
  # 静态资源配置（默认，可省略）
  web:
    resources:
      static-locations: classpath:/static/

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.campus.agent.entity

# 通义千问大模型配置（阿里云DashScope）
qwen:
  api-key: 
  model: qwen3.6-plus         # 文本对话模型
  vl-model: qwen-vl-plus      # 多模态图片理解模型（支持用户上传图片）

